name: Build Android App

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project files
        run: |
          for f in *.zip; do
            if [ -f "$f" ]; then
              echo "Unzipping $f..."
              unzip -q -o "$f"
            fi
          done

      - name: Find and Build App
        run: |
          GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLE_PATH" ]; then
            echo "ERROR: gradlew file missing!"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$GRADLE_PATH")
          cd "$PROJECT_DIR"
          chmod +x gradlew
          
          # This builds the version your phone will actually allow
          ./gradlew assembleDebug

      - name: Create Direct Phone Download Link
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest-build"
          name: "Download Your App Here"
          make_latest: "true"
          files: "**/*.apk"
