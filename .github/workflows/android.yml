name: Build Android App

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Project Files
        run: |
          # Find any zip file you uploaded and force it to unzip right here
          for f in *.zip; do
            if [ -e "$f" ]; then
              unzip -o "$f"
            fi
          done

      - name: Smart Build App
        run: |
          # Search the entire repository to find exactly where your code is hiding
          GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
          PROJECT_DIR=$(dirname "$GRADLE_PATH")
          
          echo "Found your code in: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          # Make it executable and build the release version
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Give me my App
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finished-android-app
          path: '**/*.apk'
