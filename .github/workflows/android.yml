name: Build Android App

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project files
        run: |
          # Unzip any zip file found in the repository
          for f in *.zip; do
            if [ -f "$f" ]; then
              echo "Unzipping $f..."
              unzip -q -o "$f"
            fi
          done

      - name: Find and Build App
        run: |
          # Search everywhere for the gradlew file
          GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLE_PATH" ]; then
            echo "ERROR: gradlew file is completely missing from your zip files!"
            exit 1
          fi
          
          # Get the folder name where gradlew is hiding and go inside it
          PROJECT_DIR=$(dirname "$GRADLE_PATH")
          echo "Found your code hiding in: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          # Make it executable and build the app
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finished-android-app
          path: '**/*.apk'
